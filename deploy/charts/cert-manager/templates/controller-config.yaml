{{- $perComponentLimits := dict -}}
{{- if and .Values.config .Values.config.pemSizeLimitsConfig -}}
{{- $perComponentLimits = .Values.config.pemSizeLimitsConfig -}}
{{- end -}}
{{- $pemLimits := merge (dict) $perComponentLimits (default dict .Values.global.pemSizeLimitsConfig) -}}
{{- if or .Values.config $pemLimits -}}
{{- $config := default (dict) .Values.config -}}
{{- if $pemLimits -}}
{{- $_ := set $config "pemSizeLimitsConfig" $pemLimits -}}
{{- end -}}
{{- $_ := set $config "apiVersion" (default "controller.config.cert-manager.io/v1alpha1" $config.apiVersion) -}}
{{- $_ := set $config "kind" (default "ControllerConfiguration" $config.kind) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cert-manager.fullname" . }}
  namespace: {{ include "cert-manager.namespace" . }}
  labels:
    app: {{ include "cert-manager.name" . }}
    app.kubernetes.io/name: {{ include "cert-manager.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: "controller"
    {{- include "labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- $config | toYaml | nindent 4 }}
{{- end -}}
